server:
  port: 8082

spring:
  application:
    name: inventory-service-ms
  datasource:
    url: jdbc:h2:mem:inventory-db
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true